<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" lang="en" />
    <title>My Tasks</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <section class="navigation">
      <nav>
        <ul>
          <li><a href="home_page.html">Home</a></li>
          <li>Calendar</li>
          <li>Theme</li>
          <li><a href="settings_page.html">Settings</a></li>
          <li>Login</li>
        </ul>
      </nav>
    </section>

    <section class="input">
      <input class="due_date" type="date" />
      <input class="add_tasks_field" type="text" placeholder="add a new task" />
      <button class="add_task">+</button>
    </section>

    <section>
      <h2 class="titles">To-do List</h2>
      <ul style="list-style: none;" id="tasks_list"></ul>
    </section>

    <section>
      <h2 class="titles">Progress Summary</h2>
      <div id="progress">
        <a id="box_4">Completed</a>
        <a id="box_5">Total</a>
        <a id="box_6">Remaining</a>
      </div>
    </section>

    <script src="script.js" ></script>
  </body>
</html>
