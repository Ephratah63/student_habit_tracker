<!Doctype html>
<html>
  <head>
    <meta charset='UTF-8'></meta>
    <title>Study Tracker</title>
    <link rel="stylesheet" href="styles.css"></src>
  </head>
  <body>
    <header>
      <h1 class="titles">Welcome Back!</h1>
    </header>
    <section class="input">
      <input class="textfield" type="text" placeholder="add a new task">
      <button>+</button>
    </section>
    <section>
      <h2 class="titles">Progress Summary</h2>
      <div class="progress_grid">
        <p>Completed</p>
        <p>Total</p>
        <p>Remaining</p>
      </div>
    </section>
    <script src="script.js" ></script>
  </body>
</html>
